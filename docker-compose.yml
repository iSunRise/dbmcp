services:
  dbmcp:
    build: .
    ports:
      # host:container — the MCP endpoint and CSV files are reachable from the host.
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
      # Named databases. Each lives on its own host with its own credentials,
      # all kept server-side and never exposed to callers. Add more with the
      # DB_<NAME>_URL convention — callers then select by name (case-insensitive).
      DB_DEVDB_URL: ${DB_DEVDB_URL:-postgres://devuser:devpass@devdb:5432/dev}
      DB_STAGEDB_URL: ${DB_STAGEDB_URL:-postgres://stageuser:stagepass@stagedb:5432/stage}
      QUERY_TIMEOUT_MS: ${QUERY_TIMEOUT_MS:-30000}
      MAX_OUTPUT_CHARS: ${MAX_OUTPUT_CHARS:-1000}
      MAX_CELL_CHARS: ${MAX_CELL_CHARS:-100}
      FILES_DIR: /data/files
      # Must match how the host reaches the mapped port, so CSV URLs are fetchable.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    volumes:
      - csv_files:/data/files
    depends_on:
      devdb:
        condition: service_healthy
      stagedb:
        condition: service_healthy
    restart: unless-stopped

  # --- Optional local PostgreSQL servers for testing multi-db routing. ---
  # In real use, delete these and point DB_*_URL at your actual dev/stage hosts.
  devdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  stagedb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stageuser
      POSTGRES_PASSWORD: stagepass
      POSTGRES_DB: stage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stageuser -d stage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  csv_files:
